# MotorWatch IQ — Mosquitto Broker Configuration
# Local development — no authentication, no TLS
# Path: D:\PROJECTS\MOTOR WATCH IQ\Motor_Watch_IQ\broker\mosquitto.conf

listener 1883 localhost
allow_anonymous true

# Persistent sessions — paths relative to project
persistence true
persistence_location D:/PROJECTS/MOTOR WATCH IQ/Motor_Watch_IQ/broker/data/

# Logging
log_dest file D:/PROJECTS/MOTOR WATCH IQ/Motor_Watch_IQ/broker/log/mosquitto.log
log_type all

# Limits
max_packet_size 65536
max_queued_messages 1000
